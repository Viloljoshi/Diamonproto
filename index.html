  function hideShield(){
    if (!shieldShown) return;
    var s = document.getElementById("__shield__"); if (s) s.remove();

  function check(){
    if (!window.outerWidth || !window.outerHeight) return;

    var h = window.outerHeight - window.innerHeight;
    if (w > threshold || h > threshold) showShield(); else hideShield();
  }
  setInterval(check, 900);
})();
